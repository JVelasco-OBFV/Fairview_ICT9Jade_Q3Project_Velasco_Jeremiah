    <div class="Shoe">
        <h1>Registration!</h1>
        <details ontoggle="Recomend()">
            <summary>How to register</summary>
            <br>
            <i id="message"></i>
        </details>
        <br>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRWnW0NUpcrZcGZeUJ4e50ZLU8ugS9GPPoqww&s" id="prof_pic">
        <br>
        
        <button type="button" class="btn btn-success mb-3" onclick="bread_1()" style:"font-family: Funnel Display, sans;">Upload Photo</button>
        
        <form id="registrationForm" action="#">
            <input type="file" class="form-control" id="Darvine" style:"font-family: Funnel Display, sans;">
            
            <label for="fname">Username:</label>
            <input type="text" id="fname" name="fname" class="form-control" placeholder="Create Name..." required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Create a Strong Password..." required>
            
            <label for="Age">Age:</label>
            <input type="number" id="age" name="age" class="form-control" placeholder="Input Age...">

			<label for="Age">Email:</label>
            <input type="email" id="gmail" name="gmail" class="form-control" placeholder="Input Email Address..." required>
            
            <label for="numba">Contact number:</label>
            <input type="text" id="numba" name="numba" class="form-control" placeholder="+63 XXXXXX" required>
            
            <p>Description:</p>
            <textarea name="message" class="form-control" rows="3" placeholder="Write a detailed description here..."></textarea>
            <br>
            <button type="button" class="btn btn-success w-100" onclick="handleRegistration()" style:"font-family: Funnel Display, sans;">Submit</button>
        </form>
    </div>
	<br>
	<div class="footer">
		<p>Velasco, Floro, and Abellar | 9-Jade @2026</p>
	</div>

    <script>
        function Recomend() {
            document.getElementById("message").innerHTML = "Please answer the form to finish the registration.";
        }

        function bread_1() {
            alert("Photo is Uploaded.");
            document.getElementById("prof_pic").src = "Kurt.jpg";
        }

        function handleRegistration() {
                window.location.href = 'Sign.html';
        }
    </script>
