    <script>
        // fare
        function fairCalc() {
            let pickup, dropoff, basefare, baseKM, perKMrate, distance, extraKM, discount;
                pickup = parseFloat(document.getElementById('pickup').value);
                dropoff = parseFloat(document.getElementById('dropoff').value);

                basefare = 50;
                perKMrate = 15;
                baseKM = 2;
                discount = document.getElementById('disc').checked;

                distance = Math.max(Math.abs(dropoff - pickup), 0);
                extraKM = Math.max(distance - baseKM, 0);

                if (distance > 1) { // enable fare value be equivalent to 0 if calculating the 
                // same location
                fare = basefare + extraKM * perKMrate;
                } else {
                fare = 0;
                }

            fare = fare * (1 - 0.2 * discount)// discounted only when box is checked
                document.getElementById('DisplayAns').innerHTML= 'P' + fare.toFixed(2);
        }
        
    </script>
