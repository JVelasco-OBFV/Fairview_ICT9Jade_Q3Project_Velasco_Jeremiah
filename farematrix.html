<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fare Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Indie+Flower&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Questrial&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        body{
            background: url('https://www.crownasia.com.ph/wp-content/uploads/2023/08/The-Gateway-to-the-South-SLEX.jpg');
            background-size: cover;
        } 
        #map{
            background: url('https://www.deiville.com/wp-content/uploads/2023/03/map-of-lrt-line-1-2-and-mrt-3-stations.jpg');
            background-size: cover;
            border-radius: 40px;
            color: white;
            margin-left: 40px;
            border: 8px solid #ffffff;
            padding: 5px;
            box-shadow: 0 0 4px 2px rgba(27, 27, 27, 0.5);
        }
        #image{
            width: 270px;
            height: 375px;
            margin-top: 25px;
        }
        #fare{
            background-color: rgb(32, 32, 72);
            border-radius: 40px;
            color: white; 
            padding: 50px;
        }
        #price{
            background-color: rgb(32, 32, 72);
            border-radius: 40px;
            color: white; 
            padding: 50px;
            margin-right: 40px;
        }
        #heading{
            background-color: rgb(132, 191, 255);
            color: rgb(255, 228, 56);
            border-radius: 10px;
            font-family: Questrial, sans;
        }
        select, label{
            font-family: Funnel Display, sans;
        }
        .btn-outline-warning, .btn-outline-primary{
            font-family: Funnel Display, sans;
        }
        .d-flex{
            margin-top: 70px;
        }
    </style>
</head>
<body>
    <div class="row d-flex">
        <div class="col-1 text-center me-2 mt-5 mb-5 flex-fill" id="map"></div>
        <div class="col-3 text-center mb-5 mt-5 me-2 flex-fill" id="fare">
        <h1 id="heading"><b>Fare Calculation</b></h1>
        <br>
            <label style="font-size: 20px;"><b>Origin</b></label>
            <select name="pickup" id="pickup" class="form-select">
                <option value="0">Choose a Location...</option>
                <option value="1.1">Santolan</option>
                <option value="2.3">Katipunan</option>
                <option value="3.5">Anonas</option>
                <option value="4.7">Araneta Center-Cubao</option>
                <option value="5.9">Betty Go-Belmonte</option>
                <option value="7.1">Gilmore</option>
                <option value="8.3">J. Ruiz</option>
                <option value="9.5">V. Mapa</option>
                <option value="10.7">Pureza</option>
                <option value="11.9">Legarda</option>
                <option value="13.1">Recto</option>
                <option value="14.3">Antipolo</option>
                <option value="15.5">Marikina</option>
            </select>
            <br>
            <label style="font-size: 20px;"><b>Destination</b></label>
            <select name="dropoff" id="dropoff" class="form-select">
                <option value="0">Choose a Location...</option>
                <option value="1.1">Santolan</option>
                <option value="2.3">Katipunan</option>
                <option value="3.5">Anonas</option>
                <option value="4.7">Araneta Center-Cubao</option>
                <option value="5.9">Betty Go-Belmonte</option>
                <option value="7.1">Gilmore</option>
                <option value="8.3">J. Ruiz</option>
                <option value="9.5">V. Mapa</option>
                <option value="10.7">Pureza</option>
                <option value="11.9">Legarda</option>
                <option value="13.1">Recto</option>
                <option value="14.3">Antipolo</option>
                <option value="15.5">Marikina</option>
            </select>
            <br>
            <input type="checkbox" id="disc" name="disc" class="form-check-input">
			<label for="discounted" id="dis" class="form-check-label">Discount</label>
            <br><br>

            <button class="btn btn-outline-warning" type="button" onclick="calculateFare()">Regular Fare</button>
        </div>

        <div class="col-1 text-center mb-5 mt-5 flex-fill" id="price">
            <p style="font-size: 45px; font-family: Funnel Display, sans;">Fare</p>
            <br><br>
            <h1 style="font-size: 75px; font-family: Funnel Display, sans;" id="DisplayAns">P0.00</h1>
        </div>
    </div>
    <br>

    <script>
        // fare
        function calculateFare() {
            let pickup, dropoff, basefare, baseKM, perKMrate, distance, extraKM, discount;
                pickup = parseFloat(document.getElementById('pickup').value);
                dropoff = parseFloat(document.getElementById('dropoff').value);
                basefare = 50;
                perKMrate = 15;
                baseKM = 2;
                discount = document.getElementById('disc').checked;

                distance = Math.max(Math.abs(dropoff - pickup), 0);
                extraKM = Math.max(distance - baseKM, 0);

            if (distance > 1) {
                fare = basefare + extraKM * perKMrate;
            } else {
                fare = 0;
            }

            fare = fare * (1 - 0.2 * discount)
                document.getElementById('DisplayAns').innerHTML= 'P' + fare.toFixed(2);
        }
        
    </script>
</body>
</html>
